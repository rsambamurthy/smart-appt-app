services:
  postgres:
    image: postgres:15-alpine
    container_name: smartappt-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartappt
      POSTGRES_USER: ${DB_USER:-smartappt}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartappt_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smartappt}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smartappt-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: smartappt-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-smartappt}:${DB_PASSWORD:-smartappt_secret}@postgres:5432/smartappt
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: smartappt-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-smartappt}:${DB_PASSWORD:-smartappt_secret}@postgres:5432/smartappt
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      PRISMA_QUERY_ENGINE_LIBRARY: /app/node_modules/.prisma/client/libquery_engine-linux-musl-openssl-3.0.x.so.node
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: smartappt-web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
